services:
  - type: web
    name: ombre-brain
    env: python
    region: oregon
    plan: free
    buildCommand: >
      pip install -r requirements.txt &&
      python -c "
      from src.model_downloader import download_bge_m3, status_path_for;
      import sys;
      ok = download_bge_m3('models/bge-m3', status_path_for('buckets'));
      sys.exit(0 if ok else 1)
      "
    startCommand: python src/server.py
    envVars:
      - key: OMBRE_TRANSPORT
        value: streamable-http
      - key: OMBRE_EMBED_BACKEND
        value: local          # bge-m3 preloaded at build time; no embed API key needed
      - key: OMBRE_COMPRESS_API_KEY
        sync: false          # Set in Render dashboard (any OpenAI-compatible key)
      - key: OMBRE_COMPRESS_BASE_URL
        sync: false          # e.g. https://api.deepseek.com/v1 or https://generativelanguage.googleapis.com/v1beta/openai/
      - key: OMBRE_COMPRESS_MODEL
        sync: false          # e.g. deepseek-chat or gemini-2.5-flash-lite
      - key: OMBRE_BUCKETS_DIR
        value: /opt/render/project/src/buckets
    disk:
      name: ombre-buckets
      mountPath: /opt/render/project/src/buckets
      sizeGB: 5              # bge-m3 model ~2.2GB + buckets; free plan only has 1GB, upgrade needed
